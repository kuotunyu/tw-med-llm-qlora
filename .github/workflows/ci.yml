name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpu-validation:
    name: Python 3.11 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install locked uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.30"
          python-version: "3.11"
          enable-cache: true

      - name: Install CPU validation dependencies
        run: uv sync --locked --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q

      - name: Verify generated notebooks are current
        run: |
          uv run python scripts/build_train_notebook.py --check
          uv run python scripts/build_eval_notebook.py --check
          uv run python scripts/build_full_eval_notebook.py --check
          uv run python scripts/build_export_notebook.py --check
